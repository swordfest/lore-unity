name: Release

on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a publicar (ej. 1.3.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolver tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Extraer sección del CHANGELOG
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          awk -v ver="$TAG" '
            $0 ~ "^## \\[" ver "\\]" {found=1; next}
            /^## \[/ && found {exit}
            found {print}
          ' CHANGELOG.md > /tmp/RELEASE_NOTES.md
          if ! [ -s /tmp/RELEASE_NOTES.md ]; then
            echo "_Sin sección de changelog para $TAG._" > /tmp/RELEASE_NOTES.md
          fi
          cat /tmp/RELEASE_NOTES.md

      - name: Empaquetar tarball UPM
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p /tmp/pkg/package
          rsync -a --exclude '.git' --exclude '.github' --exclude '.gitignore' \
            ./ /tmp/pkg/package/
          tar -czf "/tmp/com.swordfest.lore-$TAG.tgz" -C /tmp/pkg package
          tar -tzf "/tmp/com.swordfest.lore-$TAG.tgz" | head

      - name: Crear release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$TAG" "/tmp/com.swordfest.lore-$TAG.tgz" \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "/tmp/com.swordfest.lore-$TAG.tgz" \
              --title "Lore VCS for Unity $TAG" \
              --notes-file /tmp/RELEASE_NOTES.md \
              --repo "$GITHUB_REPOSITORY"
          fi
